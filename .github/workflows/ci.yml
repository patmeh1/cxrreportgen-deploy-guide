name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install html-validate
        run: npm install -g html-validate
      - name: Validate HTML
        run: html-validate docs/index.html
  lighthouse:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x
      - name: Run Lighthouse CI (static server)
        run: |
          npx -y http-server docs -p 8080 &
          sleep 3
          lhci autorun --collect.url=http://localhost:8080 --upload.target=temporary-public-storage || true
