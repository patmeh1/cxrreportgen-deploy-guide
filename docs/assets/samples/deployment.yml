$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json
name: cxr-report-gen-v1
endpoint_name: cxrreportgen-endpoint
model: azureml://registries/azureml/models/CxrReportGen/labels/latest
instance_type: Standard_NC24ads_A100_v4
instance_count: 1
request_settings:
  request_timeout_ms: 90000
  max_concurrent_requests_per_instance: 1
liveness_probe:
  initial_delay: 600
  period: 30
  timeout: 10
readiness_probe:
  initial_delay: 600
  period: 30
  timeout: 10
app_insights_enabled: true
