<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="ftitle fdesc" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <title id="ftitle">Microsoft Foundry with Foundry Agent Service architecture</title>
  <desc id="fdesc">Foundry project connects to Foundry Agent Service in an integration subnet, which fans out to Azure AI Search, Cosmos DB and Azure Storage with private endpoints and NSGs.</desc>
  <defs>
    <style>
      .box{fill:#f5f7fa;stroke:#0078d4;stroke-width:1.5}
      .grp{fill:none;stroke:#888;stroke-dasharray:5 4}
      .lbl{font-size:13px;fill:#1f2328}
      .lblb{font-size:14px;font-weight:600;fill:#1f2328}
      .tag{fill:#d83b01;font-weight:600;font-size:12px}
      .arr{stroke:#0078d4;stroke-width:1.8;fill:none;marker-end:url(#ah)}
      .arro{stroke:#d83b01;stroke-width:1.6;fill:none;marker-end:url(#aho)}
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 0,10 z" fill="#0078d4"/></marker>
    <marker id="aho" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 0,10 z" fill="#d83b01"/></marker>
  </defs>

  <rect x="540" y="20" width="360" height="220" rx="8" class="grp"/>
  <text x="560" y="42" class="lblb">Microsoft Foundry for Agents, Models &amp; Tools</text>
  <rect x="560" y="60" width="320" height="110" rx="6" class="box"/>
  <text x="580" y="80" class="lblb">Foundry project</text>
  <rect x="600" y="92" width="160" height="60" rx="4" class="box"/>
  <text x="615" y="115" class="lbl">Foundry Agent</text>
  <text x="615" y="132" class="lbl">Service</text>
  <rect x="600" y="180" width="160" height="40" rx="4" class="box"/>
  <text x="625" y="206" class="lbl">Azure OpenAI</text>
  <text x="790" y="206" class="tag">Azure Direct Models</text>

  <rect x="40" y="60" width="240" height="100" rx="6" class="box"/>
  <text x="60" y="85" class="lblb">Foundry Agent Service</text>
  <text x="60" y="103" class="lblb">integration subnet</text>
  <text x="60" y="135" class="lbl">Private endpoints · Subnets · NSGs</text>

  <rect x="40" y="280" width="500" height="200" rx="8" class="grp"/>
  <text x="60" y="304" class="lblb">Foundry Agent Service dependencies</text>

  <g>
    <rect x="60" y="320" width="140" height="140" rx="6" class="box"/>
    <text x="95" y="345" class="lblb">Azure AI</text>
    <text x="98" y="362" class="lblb">Search</text>
  </g>
  <g>
    <rect x="220" y="320" width="140" height="140" rx="6" class="box"/>
    <text x="248" y="345" class="lblb">Azure</text>
    <text x="248" y="362" class="lblb">Cosmos DB</text>
  </g>
  <g>
    <rect x="380" y="320" width="140" height="140" rx="6" class="box"/>
    <text x="410" y="345" class="lblb">Azure</text>
    <text x="410" y="362" class="lblb">Storage</text>
  </g>
  <text x="580" y="360" class="tag">Storage &amp; Search for Files.</text>
  <text x="580" y="378" class="tag">Database for Memory.</text>

  <path class="arr" d="M540 130 L 280 130"/>
  <path class="arro" d="M160 160 L 130 320"/>
  <path class="arro" d="M180 160 L 290 320"/>
  <path class="arro" d="M200 160 L 450 320"/>

  <text x="320" y="120" class="lbl">Foundry → integration subnet</text>
</svg>
