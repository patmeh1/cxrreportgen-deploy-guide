<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" role="img" aria-labelledby="etitle edesc" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <title id="etitle">CXRReportGen managed online endpoint architecture</title>
  <desc id="edesc">Client invokes the AML Managed Online Endpoint backed by an A100 deployment. The workspace depends on Storage, Key Vault, ACR, App Insights, and Log Analytics, with private endpoints in a customer VNet.</desc>
  <defs>
    <style>
      .box{fill:#f5f7fa;stroke:#0078d4;stroke-width:1.5}
      .lbl{font-size:13px;fill:#1f2328}
      .lblb{font-size:14px;font-weight:600;fill:#1f2328}
      .grp{fill:none;stroke:#888;stroke-dasharray:5 4}
      .arr{stroke:#0078d4;stroke-width:1.8;fill:none;marker-end:url(#ah2)}
    </style>
    <marker id="ah2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 0,10 z" fill="#0078d4"/></marker>
  </defs>

  <rect x="20" y="30" width="180" height="70" rx="6" class="box"/>
  <text x="42" y="60" class="lblb">Client app / PACS</text>
  <text x="42" y="78" class="lbl">(DICOM → PNG → b64)</text>

  <rect x="240" y="30" width="200" height="70" rx="6" class="box"/>
  <text x="262" y="55" class="lblb">APIM / Front Door</text>
  <text x="262" y="73" class="lbl">(auth, throttling, WAF)</text>

  <rect x="480" y="20" width="420" height="170" rx="8" class="grp"/>
  <text x="500" y="42" class="lblb">AML Workspace · Managed VNet</text>

  <rect x="500" y="60" width="180" height="60" rx="6" class="box"/>
  <text x="520" y="85" class="lblb">Online Endpoint</text>
  <text x="520" y="103" class="lbl">(scoring URI · key auth)</text>

  <rect x="700" y="60" width="180" height="60" rx="6" class="box"/>
  <text x="720" y="85" class="lblb">Deployment</text>
  <text x="720" y="103" class="lbl">A100 80GB · 1× NC24ads</text>

  <rect x="500" y="135" width="120" height="45" rx="6" class="box"/>
  <text x="520" y="160" class="lbl">App Insights</text>
  <rect x="630" y="135" width="120" height="45" rx="6" class="box"/>
  <text x="650" y="160" class="lbl">Log Analytics</text>
  <rect x="760" y="135" width="120" height="45" rx="6" class="box"/>
  <text x="785" y="160" class="lbl">ACR</text>

  <rect x="240" y="220" width="200" height="60" rx="6" class="box"/>
  <text x="262" y="245" class="lblb">Azure Key Vault</text>
  <text x="262" y="263" class="lbl">CMK · endpoint keys</text>

  <rect x="480" y="220" width="200" height="60" rx="6" class="box"/>
  <text x="498" y="245" class="lblb">Azure Storage</text>
  <text x="498" y="263" class="lbl">model artifacts · logs</text>

  <rect x="720" y="220" width="180" height="60" rx="6" class="box"/>
  <text x="738" y="245" class="lblb">Defender for Cloud</text>
  <text x="738" y="263" class="lbl">posture · alerts</text>

  <rect x="20" y="320" width="880" height="120" rx="8" class="grp"/>
  <text x="40" y="345" class="lblb">Customer VNet · Private Endpoints · NSGs · Private DNS</text>
  <rect x="40" y="360" width="160" height="60" rx="6" class="box"/>
  <text x="60" y="385" class="lbl">privatelink.api.azureml.ms</text>
  <text x="60" y="403" class="lbl">privatelink.notebooks</text>
  <rect x="220" y="360" width="160" height="60" rx="6" class="box"/>
  <text x="240" y="385" class="lbl">privatelink.blob</text>
  <text x="240" y="403" class="lbl">privatelink.file</text>
  <rect x="400" y="360" width="160" height="60" rx="6" class="box"/>
  <text x="420" y="385" class="lbl">privatelink.vaultcore</text>
  <text x="420" y="403" class="lbl">privatelink.azurecr.io</text>
  <rect x="580" y="360" width="160" height="60" rx="6" class="box"/>
  <text x="600" y="385" class="lbl">privatelink.monitor</text>
  <text x="600" y="403" class="lbl">privatelink.oms.opinsights</text>

  <path class="arr" d="M200 65 L240 65"/>
  <path class="arr" d="M440 65 L500 90"/>
  <path class="arr" d="M680 90 L700 90"/>
</svg>
